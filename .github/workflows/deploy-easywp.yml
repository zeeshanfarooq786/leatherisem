name: Deploy to EasyWP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SFTP secrets exist
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          missing=0
          [ -z "$SFTP_SERVER" ] && echo "::error::Secret SFTP_SERVER is missing or empty" && missing=1
          [ -z "$SFTP_USERNAME" ] && echo "::error::Secret SFTP_USERNAME is missing or empty" && missing=1
          [ -z "$SFTP_PASSWORD" ] && echo "::error::Secret SFTP_PASSWORD is missing or empty" && missing=1
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "SFTP_SERVER length: ${#SFTP_SERVER} characters"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Test SFTP connection
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "${SFTP_USERNAME}","${SFTP_PASSWORD}" "sftp://${SFTP_SERVER}:22" <<'EOF'
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          set net:timeout 120
          pwd
          ls wp-content/themes
          quit
          EOF

      - name: Deploy child theme to EasyWP
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "${SFTP_USERNAME}","${SFTP_PASSWORD}" "sftp://${SFTP_SERVER}:22" <<'EOF'
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          set net:timeout 120
          set net:max-retries 3
          mirror -R \
            --no-perms \
            --no-umask \
            --verbose \
            wp-content/themes/hello-elementor-child wp-content/themes/hello-elementor-child
          quit
          EOF
